<div class="st-dopamine-settings">
    <div id="dopamine_settings_container">
        <!-- Configuration Section -->
        <div class="dopamine-config">
            <h3>Dopamine Configuration</h3>

            <div class="flex-item" style="margin-bottom: 15px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="dopamine_enabled">
                    <span style="font-size: 1em; color: var(--SmartThemeFontColor, #ffffff);">Enable Dopamine Extension</span>
                </label>
            </div>

            <div class="flex-container">
                <div class="flex-item">
                    <label for="dopamine_min_timer">Minimum Timer (minutes):</label>
                    <input type="number" id="dopamine_min_timer" min="1" max="100" value="10">
                </div>

                <div class="flex-item">
                    <label for="dopamine_max_timer">Maximum Timer (hours):</label>
                    <input type="number" id="dopamine_max_timer" min="1" max="168" value="72">
                </div>

                <div class="flex-item">
                    <label for="dopamine_polling_interval">Polling Interval (seconds):</label>
                    <input type="number" id="dopamine_polling_interval" min="10" max="300" value="30">
                </div>
            </div>
        </div>

        <!-- Active Timers & Alarms Section -->
        <div class="dopamine-timers-list">
            <h3>Active Timers & Alarms</h3>
            <div id="dopamine_timers_display">
                <!-- Timers will be rendered here by JavaScript -->
                <p class="dopamine-empty">Loading timers...</p>
            </div>
        </div>
    </div>
</div>

<!-- Hidden template for timer items (used by JavaScript) -->
<template id="dopamine_timer_template">
    <li class="dopamine-item">
        <span class="dopamine-id"></span>
        <span class="dopamine-text"></span>
        <span class="dopamine-time"></span>
        <span class="dopamine-next"></span>
    </li>
</template>
