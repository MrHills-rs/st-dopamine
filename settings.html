<!-- third-party/Extension-Dopamine/settings.html -->
<div class="dopamine-settings">
    <div class="dopamine-config">
        <h3>Dopamine Configuration</h3>

        <div class="flex-container">
            <div class="flex-item">
                <label>
                    <input type="checkbox" id="dopamine_enabled">
                    Enable Dopamine Extension
                </label>
            </div>
        </div>

        <div class="flex-container">
            <div class="flex-item">
                <label>Minimum Timer (minutes):</label>
                <input type="number" id="dopamine_min_timer" min="1" max="60" value="10">
            </div>

            <div class="flex-item">
                <label>Maximum Timer (hours):</label>
                <input type="number" id="dopamine_max_timer" min="1" max="168" value="72">
            </div>

            <div class="flex-item">
                <label>Polling Interval (seconds):</label>
                <input type="number" id="dopamine_polling_interval" min="10" max="300" value="30">
            </div>
        </div>
    </div>

    <div class="dopamine-timers-list">
        <h3>Active Timers & Alarms</h3>
        <div id="dopamine_timers_list">
            <!-- Dynamically populated by renderSettings() -->
        </div>
    </div>
</div>
